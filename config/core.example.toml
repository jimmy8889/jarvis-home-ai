[server]
listen_host = "127.0.0.1"
listen_port = 8770
database_path = "/var/lib/pilot-core/pilot.db"
audio_asset_path = "/var/lib/pilot-core/audio"
audio_asset_max_bytes = 20000000
audio_asset_retention_seconds = 3600
meeting_asset_path = "/var/lib/pilot-core/meetings"
meeting_asset_max_bytes = 2000000000
admin_token_env = "PILOT_CORE_ADMIN_TOKEN"
bootstrap_token_env = "PILOT_CORE_BOOTSTRAP_TOKEN"
legacy_bootstrap_enabled = false

[integrations]
music_assistant_url = "http://10.0.2.72:8095"
music_assistant_token_env = "MUSIC_ASSISTANT_TOKEN"
home_assistant_url = "http://10.0.2.72:8123"
home_assistant_token_env = "HOME_ASSISTANT_TOKEN"
# Local TTS stays disabled until the provider and engine are confirmed.
tts_provider = ""
# To reuse the Home Assistant Piper integration:
# tts_provider = "home_assistant"
# tts_engine_id = "tts.piper"
# For a local OpenAI-compatible speech server:
# tts_provider = "openai"
# tts_url = "http://127.0.0.1:8000/v1/audio/speech"
tts_token_env = "PILOT_TTS_TOKEN"
tts_model = "tts-1"
tts_voice = "default"
tts_format = "wav"
tts_language = "en"
tts_timeout_seconds = 60

[[rooms]]
id = "office"
name = "Office"
response_player_id = "office-assistant"
default_music_player_id = "office-music"
default_device_id = "pilot-office"
# The room agent remains loopback-only. Pilot Core reaches it through the
# device's authenticated outbound command WebSocket, not this legacy field.
agent_url = ""

[[players]]
id = "office-assistant"
room_id = "office"
name = "Office Assistant"
protocol = "pipewire"
kind = "response"
endpoint = "homeai"

[[players]]
id = "office-music"
room_id = "office"
name = "Pilot Office Music"
protocol = "sendspin"
kind = "music"
endpoint = "ws://10.0.2.72:8927/sendspin"
external_id = "uppilotoffice"

[[players]]
id = "office-airplay"
room_id = "office"
name = "Pilot Office"
protocol = "airplay"
kind = "music-input"
endpoint = "homeai.local:5000"

[[rooms]]
id = "media-room"
name = "Media Room"
response_player_id = "media-room-assistant"
default_music_player_id = "media-room-heos"
default_device_id = ""
agent_url = ""

[[players]]
id = "media-room-assistant"
room_id = "media-room"
name = "Media Room Assistant"
protocol = "heos"
kind = "response"
endpoint = "media_player.media_room"
external_id = "1174905188"
# Discovery and state are enabled; mutations stay locked until accepted.
control_enabled = false

[[players]]
id = "media-room-heos"
room_id = "media-room"
name = "Media Room"
protocol = "heos"
kind = "music"
endpoint = "media_player.media_room"
external_id = "1174905188"
control_enabled = false

[[players]]
id = "media-room-shield"
room_id = "media-room"
name = "SHIELD"
protocol = "universal_player"
kind = "video"
external_id = "upb0713734fca0742d2bf2125b59cbf3b1"
control_enabled = false
