all:
  children:
    pilot_endpoints:
      hosts:
        office-pilot:
          ansible_host: 192.0.2.10
          ansible_user: debian-admin
          room_endpoint_room_id: office
          room_endpoint_bluetooth_enabled: false
          room_endpoint_microphone_description: Stadium USB microphone
          room_endpoint_speaker_description: FiiO K3
          room_endpoint_microphone_node: alsa_input.example.mono-fallback
          room_endpoint_speaker_node: alsa_output.usb-FiiO_K3-00.analog-stereo
          # Validate through the same shared PipeWire path used in production.
          room_endpoint_capture_alsa_device: pipewire
          room_endpoint_playback_alsa_device: pipewire
          room_endpoint_lva_install: true
          room_endpoint_lva_enabled: false
          room_endpoint_lva_version: v1.1.12
          room_endpoint_lva_client_name: Pilot Office
          room_endpoint_lva_wake_model: okay_nabu
          room_endpoint_lva_audio_input_device: Stadium USB microphone Mono
          room_endpoint_lva_audio_output_device: pipewire/alsa_output.usb-FiiO_K3-00.analog-stereo
          room_endpoint_airplay_install: true
          room_endpoint_airplay_enabled: false
          room_endpoint_airplay_name: Pilot Office
          room_endpoint_squeezelite_install: true
          room_endpoint_squeezelite_enabled: false
          room_endpoint_squeezelite_name: Pilot Office Music
          room_endpoint_squeezelite_server: 192.0.2.20
          room_endpoint_sendspin_install: true
          room_endpoint_sendspin_enabled: false
          room_endpoint_sendspin_version: 7.5.0
          room_endpoint_sendspin_name: Pilot Office Music
          room_endpoint_sendspin_id: pilot-office
          room_endpoint_sendspin_server_url: ws://192.0.2.20:8927/sendspin
          room_endpoint_sendspin_server_port: 8927
          room_endpoint_sendspin_audio_device: default
          # Enable only after Pilot Core is deployed and this device is registered.
          room_endpoint_core_reporting_enabled: false
          room_endpoint_core_commands_enabled: false
          room_endpoint_core_url: http://192.0.2.30:8770
          # Enable only after the room's source labels and gain restoration pass.
          room_endpoint_audio_focus_enabled: false
          # Prefer an Ansible Vault variable in production. For one-time local
          # enrollment, this may point at a mode-0600 controller file.
          room_endpoint_core_device_token_source_file: ""
    pilot_display_nodes:
      hosts:
        pilot-display-pi:
          ansible_host: 192.0.2.40
          ansible_user: pi-admin
          ansible_python_interpreter: /usr/bin/python3
          display_node_hostname: pilot-display-pi
          display_node_core_url: http://192.0.2.30:8770
          display_node_device_id: pilot-display-pi
          display_node_device_token_source_file: /secure/pilot-display-pi-token
          # Set to media-console for an N150 connected to a television/receiver.
          display_node_mode: display
          display_node_resolution: 1024x600
          display_node_hdmi_connector: HDMI-A-1
        pilot-media-console:
          ansible_host: 192.0.2.41
          ansible_user: pilot-admin
          ansible_python_interpreter: /usr/bin/python3
          display_node_hostname: pilot-media-console
          display_node_core_url: http://192.0.2.30:8770
          display_node_device_id: pilot-media-console
          display_node_device_token_source_file: /secure/pilot-media-console-token
          display_node_mode: media-console
          display_node_force_resolution: false
          display_node_sendspin_install: true
          display_node_sendspin_enabled: true
          display_node_sendspin_name: Pilot Media Room Music
          display_node_sendspin_id: pilot-media-room
          display_node_sendspin_server_url: ws://192.0.2.20:8927/sendspin
          # Use a PipeWire sink name accepted on the physical Denon/HDMI path.
          display_node_sendspin_audio_device: default
