[server]
listen_host = "127.0.0.1"
listen_port = 8770
database_path = "/var/lib/pilot-core/pilot.db"
admin_token_env = "PILOT_CORE_ADMIN_TOKEN"
bootstrap_token_env = "PILOT_CORE_BOOTSTRAP_TOKEN"

[integrations]
music_assistant_url = "http://10.0.2.72:8095"
music_assistant_token_env = "MUSIC_ASSISTANT_TOKEN"
home_assistant_url = "http://10.0.2.72:8123"
home_assistant_token_env = "HOME_ASSISTANT_TOKEN"

[[rooms]]
id = "office"
name = "Office"
response_player_id = "office-assistant"
default_music_player_id = "office-music"
# The room agent remains loopback-only. Pilot Core reaches it through the
# device's authenticated outbound command WebSocket, not this legacy field.
agent_url = ""

[[players]]
id = "office-assistant"
room_id = "office"
name = "Office Assistant"
protocol = "pipewire"
kind = "response"
endpoint = "homeai"

[[players]]
id = "office-music"
room_id = "office"
name = "Pilot Office Music"
protocol = "sendspin"
kind = "music"
endpoint = "ws://10.0.2.72:8927/sendspin"
external_id = "pilot-office"

[[players]]
id = "office-airplay"
room_id = "office"
name = "Pilot Office"
protocol = "airplay"
kind = "music-input"
endpoint = "homeai.local:5000"
