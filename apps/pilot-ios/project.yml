name: Pilot
options:
  bundleIdPrefix: com.jameshazell
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  Pilot:
    type: application
    platform: iOS
    sources:
      - Pilot
    info:
      path: Pilot/Info.plist
      properties:
        CFBundleDisplayName: Pilot
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: Pilot connects to your local Pilot Core server and room audio devices.
        NSMicrophoneUsageDescription: Pilot records meetings you explicitly start and uploads them to your private Pilot Core for local transcription.
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jameshazell.pilot
        PRODUCT_NAME: Pilot
        SUPPORTS_MACCATALYST: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - PilotTests
  PilotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PilotTests
    dependencies:
      - target: Pilot
