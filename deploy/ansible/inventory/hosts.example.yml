          room_endpoint_lva_client_name: Pilot Office
          room_endpoint_lva_wake_model: okay_nabu
          room_endpoint_lva_audio_input_device: Stadium USB microphone Mono
          room_endpoint_lva_audio_output_device: pipewire/alsa_output.usb-FiiO_K3-00.analog-stereo
          room_endpoint_airplay_install: true
          room_endpoint_airplay_enabled: false
          room_endpoint_airplay_name: Pilot Office
          room_endpoint_squeezelite_install: true
          room_endpoint_squeezelite_enabled: false
          room_endpoint_squeezelite_name: Pilot Office Music
          room_endpoint_squeezelite_server: 192.0.2.20
          room_endpoint_sendspin_install: true
          room_endpoint_sendspin_enabled: false
          room_endpoint_sendspin_version: 7.5.0
